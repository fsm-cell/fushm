<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全登录系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 动态背景 */
        .cyber-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        /* 粒子动画 */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.8;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container {
            background: rgba(255,255,255,0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: translateY(-20px);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px 40px 12px 50px;
            border: 2px solid #e1e5ee;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #6a11cb;
            outline: none;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
        }

        .btn {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn:hover {
            background: linear-gradient(to right, #5a0db9, #1c68f0);
            transform: translateY(-2px);
        }

        #clock {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 10px #6a11cb;
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
        }

        #countdown {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 10px #ff475a;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <!-- 时钟 -->
    <div id="clock"></div>

    <div class="cyber-background"></div>
    <div id="countdown"></div>

    <div class="container">
        <div class="logo">
            <i class="fas fa-lock"></i>
            <h1>安全登录</h1>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="btn">登录</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        // 初始化时钟
        function updateClock() {
            const clockElement = document.getElementById('clock');
            const now = new Date();
            clockElement.innerHTML = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const countdownElement = document.getElementById('countdown');

            // 清除旧消息
            messageDiv.style.display = 'none';
            messageDiv.className = 'message';
            
            // 验证逻辑
            if (username === 'admin' && password === '123456') {
                showMessage('验证成功！3秒后跳转...', 'success');
                
                // 启动倒计时
                let seconds = 3;
                countdownElement.innerHTML = `自动跳转倒计时: ${seconds}秒`;
                const interval = setInterval(() => {
                    seconds--;
                    if(seconds <= 0){
                        clearInterval(interval);
                        window.location.href = "dashboard.html"; // 跳转页面
                    } else {
                        countdownElement.innerHTML = `自动跳转倒计时: ${seconds}秒`;
                    }
                }, 1000);
            } else {
                showMessage('用户名或密码错误', 'error');
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // 添加粒子效果
            createParticles(messageDiv.offsetLeft, messageDiv.offsetTop);
        }

        function createParticles(x, y) {
            for(let i = 0; i < 15; i++){
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.transform = `translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)`;
                particle.style.opacity = Math.random();
                particle.style.transition = `all ${Math.random()*2 + 1}s ease-out`;
                document.body.appendChild(particle);
                
                // 点击触发动画
                particle.addEventListener('click', () => {
                    particle.style.transform = 'scale(3)';
                    particle.style.opacity = 0;
                });
            }
        }
    </script>
</body>
</html>
